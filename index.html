async function loadState() {
  if (!isConfigured()) return { entries: makeSeed(), bgImage: '' };
  try {
    var resp = await fetch('https://api.jsonbin.io/v3/b/' + CONFIG.JSONBIN_BIN + '/latest', {
      headers: { 'X-Master-Key': CONFIG.JSONBIN_KEY }
    });
    if (!resp.ok) throw new Error('HTTP ' + resp.status);
    var data = await resp.json();
    var record = data.record || data;
    return {
      entries: Array.isArray(record.entries) && record.entries.length > 0 ? record.entries : makeSeed(),
      bgImage: record.bgImage || ''
    };
  } catch(e) {
    console.error('[ActionLog] loadState error:', e);
    return { entries: makeSeed(), bgImage: '' };
  }
}

async function saveState(entries, bgImage) {
  if (!isConfigured()) return;
  var resp = await fetch('https://api.jsonbin.io/v3/b/' + CONFIG.JSONBIN_BIN, {
    method: 'PUT',
    headers: { 'Content-Type': 'application/json', 'X-Master-Key': CONFIG.JSONBIN_KEY },
    body: JSON.stringify({ entries: entries, bgImage: bgImage || '' })
  });
  if (!resp.ok) throw new Error('HTTP ' + resp.status);
}

function isAdmin(user) { return ADMIN_USERS.indexOf(user) !== -1; }
function isMyTask(entry, user) {
  if (!entry.responsables) return false;
  return entry.responsables.toLowerCase().indexOf(user.toLowerCase()) !== -1;
}

function fmtDate(iso) {
  if (!iso) return '';
  var p = iso.split('-');
  return p[2] + '/' + p[1] + '/' + p[0];
}
function fmtDateTime(iso) {
  if (!iso) return '';
  var dt = new Date(iso);
  return dt.getDate().toString().padStart(2,'0') + '/' + (dt.getMonth()+1).toString().padStart(2,'0') + '/' + dt.getFullYear() + ' ' + dt.getHours().toString().padStart(2,'0') + ':' + dt.getMinutes().toString().padStart(2,'0');
}
function isOverdue(fl, res) { return !res && !!fl && fl < TODAY; }
function progColor(p) { return p >= 100 ? '#10b981' : p >= 60 ? '#f59e0b' : '#3b82f6'; }
function emptyEntry() {
  return { id: null, fecha: TODAY, pilar: PILLARS[0].id, tarea: '', accion: '', responsables: '', emails: '', fechaLimite: '', resuelto: false, progreso: 0, evolutivo: [], fotos: [], createdAt: new Date().toISOString() };
}

function getInitials(name) {
  return name.split(' ').slice(0,2).map(function(w) { return w[0]; }).join('').toUpperCase();
}

function sendNotificationEmail(entry, isNew) {
  var emails = (entry.emails || '').trim();
  if (!emails) return;
  var subject = encodeURIComponent((isNew ? '[Nueva Accion] ' : '[Actualizacion] ') + entry.tarea + ' - SCZ1 Escobar');
  var body = encodeURIComponent('Hola,\n\n' + (isNew ? 'Se te asigno una nueva accion:' : 'Se actualizo una accion:') + '\n\nTarea: ' + entry.tarea + '\nPilar: ' + entry.pilar + '\nAccion: ' + (entry.accion || '-') + '\nResponsable(s): ' + (entry.responsables || '-') + '\nFecha limite: ' + fmtDate(entry.fechaLimite) + '\nProgreso: ' + entry.progreso + '%\nEstado: ' + (entry.resuelto ? 'Resuelto' : 'Pendiente') + '\n\nVer app: ' + window.location.href + '\n\nSaludos,\nAction Log SCZ1 - Escobar');
  var a = document.createElement('a');
  a.href = 'mailto:' + emails + '?subject=' + subject + '&body=' + body;
  a.style.display = 'none';
  document.body.appendChild(a);
  a.click();
  setTimeout(function() { document.body.removeChild(a); }, 500);
}
