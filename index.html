<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Action Log SCZ1 - Escobar</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--accent:#ffe600;--navy:#1a1f2e;--bg:#f4f5f8;--surface:#fff;--border:#e2e6ef;--text:#1a1f2e;--text-muted:#6b7280;--radius:8px;--shadow:0 1px 3px rgba(0,0,0,.07),0 1px 2px rgba(0,0,0,.04)}
body.dark{--bg:#111827;--surface:#1f2937;--border:#374151;--text:#f9fafb;--text-muted:#9ca3af}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:var(--bg);color:var(--text);font-size:14px;line-height:1.5;transition:background .2s,color .2s}
@keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
@keyframes fadeIn{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
.login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#1a1f2e 0%,#2d3548 100%);padding:20px}
.login-card{background:#fff;border-radius:16px;padding:40px 36px 36px;max-width:480px;width:100%;box-shadow:0 24px 64px rgba(0,0,0,.35);animation:fadeIn .4s ease}
.login-logo{width:56px;height:56px;background:#ffe600;border-radius:12px;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:20px;color:#1a1f2e;margin:0 auto 20px}
.login-title{font-size:22px;font-weight:800;color:#1a1f2e;text-align:center;margin-bottom:4px}
.login-sub{color:#6b7280;font-size:13px;text-align:center;margin-bottom:28px}
.login-label{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:#6b7280;margin-bottom:10px}
.user-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:24px}
.user-card{border:2px solid #e2e6ef;border-radius:10px;padding:12px 14px;cursor:pointer;transition:all .15s;display:flex;align-items:center;gap:10px;background:#fff}
.user-card:hover{border-color:#ffe600;background:#fffbeb}
.user-card.selected{border-color:#1a1f2e;background:#1a1f2e;color:#fff}
.user-card.selected .user-card-role{color:rgba(255,255,255,.6)}
.user-card.admin-card.selected{border-color:#ffe600;background:#1a1f2e}
.user-avatar{width:34px;height:34px;border-radius:50%;background:#e2e6ef;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:#1a1f2e;flex-shrink:0}
.user-card.selected .user-avatar{background:rgba(255,255,255,.15);color:#fff}
.user-card.admin-card.selected .user-avatar{background:#ffe600;color:#1a1f2e}
.user-card-name{font-size:13px;font-weight:600;line-height:1.2}
.user-card-role{font-size:11px;color:#6b7280;margin-top:1px}
.login-btn{width:100%;padding:12px;background:#ffe600;color:#1a1f2e;border:none;border-radius:8px;font-size:14px;font-weight:700;cursor:pointer;transition:opacity .15s}
.login-btn:disabled{opacity:.4;cursor:not-allowed}
.login-btn:not(:disabled):hover{opacity:.88}
.header{background:var(--navy);padding:0 24px;height:60px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;box-shadow:0 2px 8px rgba(0,0,0,.3)}
.header-left{display:flex;align-items:center;gap:12px}
.header-logo{width:36px;height:36px;background:var(--accent);border-radius:8px;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:14px;color:var(--navy);flex-shrink:0}
.header-title{color:#fff;font-size:17px;font-weight:700;line-height:1.2}
.header-subtitle{color:rgba(255,255,255,.55);font-size:12px}
.header-right{display:flex;align-items:center;gap:10px}
.user-chip{background:rgba(255,230,0,.15);border:1px solid rgba(255,230,0,.3);color:#ffe600;border-radius:20px;padding:4px 12px;font-size:12px;font-weight:600;display:flex;align-items:center;gap:6px}
.dark-toggle{background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);color:#fff;border-radius:20px;padding:5px 12px;font-size:12px;cursor:pointer;transition:background .15s}
.dark-toggle:hover{background:rgba(255,255,255,.2)}
.logout-btn{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.15);color:rgba(255,255,255,.7);border-radius:20px;padding:5px 12px;font-size:12px;cursor:pointer}
.logout-btn:hover{background:rgba(255,255,255,.15);color:#fff}
.main{padding:24px;max-width:1400px;margin:0 auto}
body.has-bg .main{background:rgba(244,245,248,.9);backdrop-filter:blur(2px)}
body.dark.has-bg .main{background:rgba(17,24,39,.9)}
.collab-banner{background:linear-gradient(90deg,rgba(255,230,0,.12),rgba(255,230,0,.05));border:1px solid rgba(255,230,0,.3);border-radius:8px;padding:10px 16px;margin-bottom:16px;font-size:13px;color:var(--text);display:flex;align-items:center;gap:8px}
.stats-bar{display:flex;gap:12px;margin-bottom:20px;flex-wrap:wrap}
.stat-chip{background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:7px 18px;font-size:13px;font-weight:600;color:var(--text);display:flex;align-items:center;gap:7px;box-shadow:var(--shadow)}
.stat-chip .stat-num{font-size:16px;font-weight:700}
.stat-chip.total .stat-num{color:var(--navy)}
body.dark .stat-chip.total .stat-num{color:#f9fafb}
.stat-chip.resueltas .stat-num{color:#10b981}
.stat-chip.pendientes .stat-num{color:#f59e0b}
.stat-chip.vencidas .stat-num{color:#ef4444}
.stat-chip.vencidas{border-color:rgba(239,68,68,.35)}
.stat-chip.resueltas{border-color:rgba(16,185,129,.35)}
.filter-bar{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:14px 18px;display:flex;gap:12px;align-items:center;flex-wrap:wrap;margin-bottom:16px;box-shadow:var(--shadow)}
.filter-input{background:var(--bg);border:1px solid var(--border);color:var(--text);border-radius:6px;padding:7px 10px;font-size:13px;outline:none;transition:border-color .15s;font-family:inherit}
.filter-input:focus{border-color:var(--accent)}
.filter-search{position:relative;flex:1;min-width:180px}
.filter-search-icon{position:absolute;left:9px;top:50%;transform:translateY(-50%);color:var(--text-muted);font-size:14px;pointer-events:none}
.filter-search input{width:100%;padding-left:30px}
.table-container{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;box-shadow:var(--shadow)}
.table-header-row{padding:12px 18px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid var(--border)}
.table-title{font-size:14px;font-weight:700;color:var(--text)}
.table-count{font-size:12px;color:var(--text-muted);margin-left:8px}
table{width:100%;border-collapse:collapse}
thead th{background:var(--navy);color:#fff;padding:10px 12px;text-align:left;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;white-space:nowrap}
td{padding:10px 12px;border-bottom:1px solid var(--border);font-size:13px;vertical-align:middle}
tbody tr:nth-child(even){background:rgba(0,0,0,.02)}
body.dark tbody tr:nth-child(even){background:rgba(255,255,255,.02)}
tbody tr:hover{background:rgba(255,230,0,.05)}
tbody tr.resolved{opacity:.65}
tbody tr.resolved td:first-child{border-left:3px solid #10b981;padding-left:9px}
tbody tr.my-task{background:rgba(255,230,0,.06)}
tbody tr.my-task:hover{background:rgba(255,230,0,.1)}
.cell-num{color:var(--text-muted);font-size:12px}
.cell-tarea{font-weight:600;max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.cell-accion{color:var(--text-muted);max-width:220px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.cell-overdue{color:#ef4444;font-weight:600}
.progress-cell{display:flex;align-items:center;gap:6px}
.progress-track{height:6px;background:var(--border);border-radius:3px;overflow:hidden;width:60px;flex-shrink:0}
.progress-fill{height:100%;border-radius:3px;transition:width .3s}
.progress-label{font-size:11px;color:var(--text-muted);min-width:28px}
.cell-check input{cursor:pointer;width:16px;height:16px}
.cell-actions{display:flex;gap:6px;align-items:center;white-space:nowrap}
.pilar-pill{border-radius:20px;padding:3px 10px;font-size:11px;font-weight:700;white-space:nowrap;display:inline-block}
.my-badge{background:#ffe600;color:#1a1f2e;border-radius:4px;font-size:10px;font-weight:700;padding:1px 5px;margin-left:4px;vertical-align:middle}
.btn{border:none;border-radius:6px;cursor:pointer;font-size:13px;font-weight:600;padding:8px 16px;transition:opacity .15s,transform .1s;display:inline-flex;align-items:center;gap:6px;font-family:inherit}
.btn:hover{opacity:.88}
.btn:active{transform:scale(.97)}
.btn-primary{background:var(--accent);color:var(--navy)}
.btn-cancel{background:var(--bg);border:1px solid var(--border);color:var(--text)}
.btn-del-confirm{background:#ef4444;color:#fff}
.btn-icon{background:none;border:none;cursor:pointer;padding:4px 7px;border-radius:5px;font-size:14px;transition:background .15s;color:var(--text-muted)}
.btn-icon:hover{background:var(--border)}
.btn-icon.edit:hover{color:#3b82f6}
.btn-icon.del:hover{color:#ef4444}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:1000;display:flex;align-items:center;justify-content:center;padding:20px}
.modal-box{background:var(--surface);border-radius:12px;width:100%;max-width:600px;max-height:90vh;overflow:hidden;display:flex;flex-direction:column;box-shadow:0 20px 60px rgba(0,0,0,.3);animation:fadeIn .2s ease}
.modal-header{padding:18px 20px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}
.modal-header-title{font-size:15px;font-weight:700}
.modal-close{background:none;border:none;cursor:pointer;font-size:18px;color:var(--text-muted);padding:2px 6px;border-radius:4px}
.modal-close:hover{background:var(--border);color:var(--text)}
.modal-tabs{display:flex;border-bottom:1px solid var(--border);padding:0 20px}
.modal-tab{background:none;border:none;cursor:pointer;padding:10px 14px;font-size:13px;font-weight:600;color:var(--text-muted);border-bottom:2px solid transparent;transition:color .15s;font-family:inherit}
.modal-tab.active{color:var(--navy);border-bottom-color:var(--accent)}
body.dark .modal-tab.active{color:#f9fafb}
.modal-body{padding:20px;overflow-y:auto;flex:1}
.modal-footer{padding:14px 20px;border-top:1px solid var(--border);display:flex;justify-content:flex-end;gap:10px}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.form-group{display:flex;flex-direction:column;gap:5px}
.form-group.full{grid-column:1/-1}
.form-label{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.4px;color:var(--text-muted)}
.form-control{background:var(--bg);border:1px solid var(--border);color:var(--text);border-radius:6px;padding:8px 10px;font-size:13px;outline:none;font-family:inherit;transition:border-color .15s}
.form-control:focus{border-color:var(--accent)}
.form-control:read-only{opacity:.6;cursor:not-allowed}
textarea.form-control{resize:vertical}
.range-row{display:flex;align-items:center;gap:10px}
.range-row input[type=range]{flex:1}
.range-val{font-weight:700;font-size:14px;min-width:36px;text-align:right}
.form-inline{display:flex;align-items:center;gap:8px;padding-top:8px}
.req{color:#ef4444}
.readonly-badge{background:var(--bg);border:1px solid var(--border);border-radius:6px;padding:8px 12px;font-size:13px;color:var(--text-muted);font-style:italic}
.evo-progress-bar-wrap{margin-bottom:16px}
.evo-progress-label{display:flex;justify-content:space-between;margin-bottom:6px;font-size:13px}
.evo-progress-track{height:10px;background:var(--border);border-radius:5px;overflow:hidden}
.evo-progress-fill{height:100%;border-radius:5px;transition:width .3s}
.evo-list{margin-bottom:14px;display:flex;flex-direction:column;gap:8px}
.evo-entry{background:var(--bg);border:1px solid var(--border);border-radius:6px;padding:10px 12px}
.evo-entry-header{display:flex;justify-content:space-between;margin-bottom:4px}
.evo-entry-meta{font-size:11px;color:var(--text-muted)}
.evo-entry-text{font-size:13px}
.evo-empty{color:var(--text-muted);font-size:13px;text-align:center;padding:20px}
.evo-add-form{border-top:1px solid var(--border);padding-top:14px;display:flex;flex-direction:column;gap:8px}
.evo-add-label{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.4px;color:var(--text-muted)}
.photo-upload-area{border:2px dashed var(--border);border-radius:8px;padding:24px;text-align:center;cursor:pointer;margin-bottom:14px;transition:border-color .15s}
.photo-upload-area:hover{border-color:var(--accent)}
.photo-upload-icon{font-size:28px;margin-bottom:6px}
.photo-upload-text{font-size:13px;font-weight:600}
.photo-upload-sub{font-size:11px;color:var(--text-muted);margin-top:2px}
.photo-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-top:10px}
.photo-thumb{border:1px solid var(--border);border-radius:6px;overflow:hidden;position:relative}
.photo-thumb-img{width:100%;aspect-ratio:1;object-fit:cover;cursor:pointer;display:block}
.photo-info{padding:4px 6px}
.photo-name{font-size:11px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;display:block}
.photo-date{font-size:10px;color:var(--text-muted)}
.photo-del{position:absolute;top:4px;right:4px;background:rgba(0,0,0,.5);color:#fff;border:none;border-radius:50%;width:20px;height:20px;cursor:pointer;font-size:11px;display:flex;align-items:center;justify-content:center}
.photo-empty{color:var(--text-muted);font-size:13px;text-align:center;padding:20px}
.lightbox{position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:2000;display:flex;align-items:center;justify-content:center}
.lightbox-img{max-width:90vw;max-height:90vh;border-radius:8px}
.lightbox-close{position:absolute;top:20px;right:20px;background:rgba(255,255,255,.15);border:none;color:#fff;width:36px;height:36px;border-radius:50%;cursor:pointer;font-size:18px}
.toast-container{position:fixed;bottom:24px;right:24px;z-index:3000;display:flex;flex-direction:column;gap:8px}
.toast{background:#1a1f2e;color:#fff;border-radius:8px;padding:10px 16px;font-size:13px;box-shadow:0 4px 12px rgba(0,0,0,.25);animation:slideIn .25s ease;max-width:320px}
.toast.success{background:#065f46;border-left:3px solid #10b981}
.toast.error{background:#7f1d1d;border-left:3px solid #ef4444}
.toast.info{background:#1e3a5f;border-left:3px solid #3b82f6}
@keyframes slideIn{from{transform:translateY(20px);opacity:0}to{transform:translateY(0);opacity:1}}
.empty-state{text-align:center;padding:48px 24px;color:var(--text-muted)}
.empty-icon{font-size:40px;margin-bottom:12px}
.empty-text{font-size:14px}
.confirm-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:1500;display:flex;align-items:center;justify-content:center;padding:20px}
.confirm-box{background:var(--surface);border-radius:10px;padding:24px;max-width:380px;width:100%;box-shadow:0 10px 40px rgba(0,0,0,.3)}
.confirm-title{font-size:16px;font-weight:700;margin-bottom:8px;color:var(--text)}
.confirm-text{font-size:13px;color:var(--text-muted);margin-bottom:20px;line-height:1.5}
.confirm-btns{display:flex;justify-content:flex-end;gap:10px}
@media(max-width:768px){.form-grid{grid-template-columns:1fr}.photo-grid{grid-template-columns:repeat(2,1fr)}.main{padding:12px}.user-grid{grid-template-columns:1fr}}
.nav-tabs{background:var(--navy);display:flex;gap:0;border-bottom:2px solid rgba(255,255,255,.1)}
.nav-tab{background:none;border:none;color:rgba(255,255,255,.6);padding:0 24px;height:44px;font-size:13px;font-weight:600;cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-2px;transition:all .15s;font-family:inherit;display:flex;align-items:center;gap:7px}
.nav-tab:hover{color:#fff;background:rgba(255,255,255,.05)}
.nav-tab.active{color:#ffe600;border-bottom-color:#ffe600}
.analytics-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(340px,1fr));gap:20px;margin-top:4px}
.chart-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:20px;box-shadow:var(--shadow)}
.chart-title{font-size:13px;font-weight:700;color:var(--text);margin-bottom:4px}
.chart-sub{font-size:11px;color:var(--text-muted);margin-bottom:16px}
.kpi-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:20px}
.kpi-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px 20px;box-shadow:var(--shadow);text-align:center}
.kpi-num{font-size:28px;font-weight:800;line-height:1.1;margin-bottom:4px}
.kpi-label{font-size:11px;color:var(--text-muted);text-transform:uppercase;letter-spacing:.4px}
@media(max-width:768px){.kpi-grid{grid-template-columns:repeat(2,1fr)}.analytics-grid{grid-template-columns:1fr}}

/* ── DOTACION STYLES ── */
.dot-wrap{padding:20px;max-width:1400px;margin:0 auto}
.dot-fcst-bar{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;margin-bottom:16px;box-shadow:var(--shadow)}
.dot-sec-hdr{background:var(--navy);color:#fff;font-weight:700;font-size:11px;letter-spacing:.07em;text-transform:uppercase;padding:7px 12px}
.dot-fcst-inputs{display:flex;gap:10px;padding:12px;flex-wrap:wrap}
.dot-fcst-box{flex:1;min-width:120px;border-radius:8px;padding:10px 12px;display:flex;flex-direction:column;gap:4px}
.dot-fcst-box-scz1{background:#FFFBEA;border:2px solid #F0C900}
.dot-fcst-box-ecz{background:#EEF6FF;border:2px solid #185FA5}
.dot-fcst-box-pm{background:#F0FFF6;border:2px solid #1D7A4A}
.dot-fcst-box-total{background:#EFEFEB;border:2px solid #D3D1C7;min-width:100px;display:flex;flex-direction:column;justify-content:center;align-items:center}
.dot-fcst-label{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.06em}
.dot-fcst-input{border:none;background:transparent;font-size:22px;font-weight:800;font-family:inherit;outline:none;padding:0;text-align:right;width:100%}
.dot-fcst-sub{font-size:10px;color:var(--text-muted);text-align:right}
.dot-grid{display:grid;grid-template-columns:1fr 1fr 240px;gap:14px;align-items:start}
.dot-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;margin-bottom:14px;box-shadow:var(--shadow)}
.dot-col-hdr{display:grid;grid-template-columns:1fr 60px 60px 74px 110px;background:#EFEFEB;border-bottom:1px solid var(--border)}
.dot-col-hdr-cell{padding:4px 6px;font-size:10px;font-weight:700;text-align:center;color:var(--navy);text-transform:uppercase;letter-spacing:.05em}
.dot-col-hdr-cell:first-child{text-align:left;padding-left:10px}
.dot-row{display:grid;grid-template-columns:1fr 60px 60px 74px 110px;align-items:center;border-bottom:1px solid var(--border)}
.dot-row-label{padding:6px 10px;font-size:13px}
.dot-row-cell{text-align:center;padding:4px 4px;font-size:13px;font-weight:500}
.dot-num-input{width:58px;text-align:center;border:1.5px solid;border-radius:4px;padding:3px 4px;font-size:13px;font-family:inherit;font-weight:700;outline:none}
.dot-diff-badge{display:inline-flex;align-items:center;gap:4px;border-radius:4px;padding:2px 8px;font-size:12px;font-weight:700;white-space:nowrap}
.dot-stat-row{display:flex;justify-content:space-between;align-items:center;padding:6px 10px;border-bottom:1px solid var(--border);font-size:13px}
.dot-ggp-grid{display:grid;grid-template-columns:1fr 60px 60px;border-bottom:1px solid var(--border)}
.dot-ggp-cell{padding:5px 6px;font-size:12px;text-align:center}
.dot-ggp-cell:first-child{text-align:left;padding-left:8px}
.dot-wa-bubble{background:#E1F5EE;border-radius:12px 12px 12px 2px;padding:10px 14px}
.dot-wa-pre{margin:0;white-space:pre-wrap;font-family:inherit;font-size:12px;color:#085041;line-height:1.6}
.dot-save-btn{width:100%;padding:10px;border-radius:7px;border:none;cursor:pointer;font-weight:700;font-size:13px;font-family:inherit;transition:all .2s}
.dot-tabla-row{display:grid;grid-template-columns:1fr 1fr;border-bottom:1px solid var(--border)}
.dot-tabla-cell{padding:4px 8px;font-size:12px;text-align:center}
